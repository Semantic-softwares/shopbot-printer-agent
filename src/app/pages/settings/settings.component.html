<!-- Header -->
<div class="mb-8">
  <h2 class="text-3xl font-bold text-gray-900 dark:text-white mb-1">Settings</h2>
  <p class="text-gray-500 dark:text-slate-400 text-sm">Configure your printer system</p>
</div>

<!-- Settings Sections -->
<div class="space-y-6 max-w-3xl">
  <!-- Network Settings -->
  <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-gray-200 dark:border-slate-700 shadow-sm">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Network Settings</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Auto-Discover Subnet</label>
        <input
          type="text"
          placeholder="192.168.1"
          value="192.168.1"
          class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-white rounded-lg border border-gray-300 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors text-sm placeholder-gray-400 dark:placeholder-slate-500"
        />
        <p class="text-gray-400 dark:text-slate-500 text-xs mt-2">Enter the first 3 octets of your network (e.g., 192.168.1)</p>
      </div>
      <button class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium transition-colors">
        🔍 Scan Network
      </button>
    </div>
  </div>

  <!-- API Settings -->
  <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-gray-200 dark:border-slate-700 shadow-sm">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">API Configuration</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">API Base URL</label>
        <input
          type="text"
          value="http://localhost:4000"
          disabled
          class="w-full px-4 py-2.5 bg-gray-100 dark:bg-slate-700 text-gray-400 dark:text-slate-500 rounded-lg border border-gray-200 dark:border-slate-600 outline-none cursor-not-allowed text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">API Port</label>
        <input
          type="number"
          value="4000"
          disabled
          class="w-full px-4 py-2.5 bg-gray-100 dark:bg-slate-700 text-gray-400 dark:text-slate-500 rounded-lg border border-gray-200 dark:border-slate-600 outline-none cursor-not-allowed text-sm"
        />
      </div>
    </div>
  </div>

  <!-- Printer Defaults -->
  <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-gray-200 dark:border-slate-700 shadow-sm">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">Printer Defaults</h3>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Default Port</label>
        <input
          type="number"
          value="9100"
          class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-white rounded-lg border border-gray-300 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Connection Timeout (ms)</label>
        <input
          type="number"
          value="3000"
          class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-white rounded-lg border border-gray-300 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors text-sm"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-slate-300 mb-1.5">Max Retries</label>
        <input
          type="number"
          value="3"
          class="w-full px-4 py-2.5 bg-white dark:bg-slate-700 text-gray-900 dark:text-white rounded-lg border border-gray-300 dark:border-slate-600 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors text-sm"
        />
      </div>
    </div>
  </div>

  <!-- System Info -->
  <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-gray-200 dark:border-slate-700 shadow-sm">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4">System Information</h3>
    <div class="space-y-3 text-sm">
      <div class="flex justify-between py-1">
        <span class="text-gray-500 dark:text-slate-400">Application Version:</span>
        <span class="text-gray-700 dark:text-slate-300 font-mono">1.0.0</span>
      </div>
      <div class="flex justify-between py-1 border-t border-gray-100 dark:border-slate-700">
        <span class="text-gray-500 dark:text-slate-400">Electron Version:</span>
        <span class="text-gray-700 dark:text-slate-300 font-mono">27.0.0</span>
      </div>
      <div class="flex justify-between py-1 border-t border-gray-100 dark:border-slate-700">
        <span class="text-gray-500 dark:text-slate-400">Node.js Version:</span>
        <span class="text-gray-700 dark:text-slate-300 font-mono">20.x.x</span>
      </div>
      <div class="flex justify-between py-1 border-t border-gray-100 dark:border-slate-700">
        <span class="text-gray-500 dark:text-slate-400">Platform:</span>
        <span class="text-gray-700 dark:text-slate-300 font-mono">macOS</span>
      </div>
    </div>
  </div>

  <!-- Save Button -->
  <div class="flex gap-3 pt-2">
    <button class="inline-flex items-center gap-2 px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-medium transition-colors">
      ✅ Save Settings
    </button>
    <button class="inline-flex items-center gap-2 px-6 py-2.5 bg-white dark:bg-slate-700 text-gray-700 dark:text-slate-300 rounded-lg border border-gray-300 dark:border-slate-600 hover:bg-gray-50 dark:hover:bg-slate-600 text-sm font-medium transition-colors">
      ↩️ Reset
    </button>
  </div>
</div>
