@if (isLoggedIn()) {
<div class="flex h-screen bg-gray-50 dark:bg-slate-900 transition-colors duration-200">
  <!-- Sidebar -->
  @if (sidebarOpen()) {
    <aside class="w-64 bg-white dark:bg-slate-800 border-r border-gray-200 dark:border-slate-700 flex flex-col shrink-0 transition-colors duration-200">
      <!-- Logo + Store Name -->
      <div class="h-auto flex flex-col items-start px-6 py-4 border-b border-gray-200 dark:border-slate-700">
        <div class="flex items-center gap-3">
          <span class="text-xl">🖨️</span>
          <span class="text-lg font-semibold text-gray-900 dark:text-white">ShopBot Printer</span>
        </div>
        <div class="mt-2 flex items-center gap-2 w-full">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400 text-xs font-bold shrink-0">
            🏪
          </span>
          <span class="text-sm font-medium text-indigo-600 dark:text-indigo-400 truncate">{{ storeName() }}</span>
        </div>
      </div>

      <!-- Nav -->
      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
        <p class="px-3 mb-2 text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-slate-500">Navigation</p>

        <a routerLink="/dashboard" routerLinkActive="bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400" [routerLinkActiveOptions]="{ exact: true }"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
          <span class="text-lg">📊</span>
          Dashboard
        </a>

        <a routerLink="/printers" routerLinkActive="bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
          <span class="text-lg">🖨️</span>
          Printers
        </a>

        <a routerLink="/logs" routerLinkActive="bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
          <span class="text-lg">📋</span>
          Print Logs
        </a>

        <a routerLink="/settings" routerLinkActive="bg-indigo-50 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-700 dark:text-slate-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors">
          <span class="text-lg">⚙️</span>
          Settings
        </a>
      </nav>

      <!-- Logout + Footer -->
      <div class="px-3 pb-3">
        <button (click)="logout()"
                class="flex items-center gap-3 px-3 py-2.5 w-full rounded-lg text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
          <span class="text-lg">🚪</span>
          Logout
        </button>
      </div>
      <div class="px-4 py-3 border-t border-gray-200 dark:border-slate-700">
        <p class="text-xs text-gray-400 dark:text-slate-500 text-center">Enterprise Print Management</p>
      </div>
    </aside>
  }

  <!-- Main area -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Top bar -->
    <header class="h-16 bg-white dark:bg-slate-800 border-b border-gray-200 dark:border-slate-700 flex items-center px-6 shrink-0 transition-colors duration-200">
      <button (click)="toggleSidebar()"
              class="p-2 rounded-lg text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700 hover:text-gray-700 dark:hover:text-white transition-colors mr-4">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <h1 class="text-lg font-semibold text-gray-900 dark:text-white">{{ storeName() }}</h1>

      <span class="flex-1"></span>

      <!-- Dark mode toggle -->
      <button (click)="toggleDarkMode()"
              class="p-2 rounded-lg text-gray-500 dark:text-slate-400 hover:bg-gray-100 dark:hover:bg-slate-700 hover:text-gray-700 dark:hover:text-white transition-colors"
              [attr.aria-label]="darkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
        @if (darkMode()) {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        } @else {
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        }
      </button>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
} @else {
  <!-- Login page — no sidebar, full-screen -->
  <router-outlet></router-outlet>
}
